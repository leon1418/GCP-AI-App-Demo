apiVersion: apps/v1
kind: Deployment
metadata:
  name: dog-breed-detector
  labels:
    app: dog-breed-detector
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dog-breed-detector
  template:
    metadata:
      labels:
        app: dog-breed-detector
    spec:
      serviceAccountName: dog-breed-detector-ksa
      containers:
        - name: dog-breed-detector
          image: us-central1-docker.pkg.dev/agentcore-467421/dog-breed-detector/app:v2
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: app-config
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
